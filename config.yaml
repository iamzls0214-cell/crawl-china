# 中国贸易数据爬虫配置
# China Trade Data Crawler Configuration

countries:
  - name: 越南
    code: VN
    mofcom_key: "%E8%B6%8A%E5%8D%97"
  - name: 泰国
    code: TH
    mofcom_key: "%E6%B3%B0%E5%9B%BD"
  - name: 印度尼西亚
    code: ID
    mofcom_key: "%E5%8D%B0%E5%BA%A6%E5%B0%BC%E8%A5%BF%E4%BA%9A"

crawl:
  months_back: 24
  request_interval_seconds: 3.0
  max_retries: 3
  timeout_seconds: 30

google_trends:
  enabled: false  # 需代理才能访问 Google，配好代理后改 true
  proxy: null  # 设置代理, e.g. "http://127.0.0.1:7890" (Clash/V2Ray)
  timeout_seconds: 45
  keywords:
    vietnam:
      - China Vietnam trade
      - 中越贸易
      - Vietnam import
      - 越南市场
    thailand:
      - China Thailand trade
      - 中泰贸易
      - Thailand import
      - 泰国市场
    indonesia:
      - China Indonesia trade
      - 印尼贸易
      - Indonesia import
      - 印尼市场

comtrade:
  enabled: true
  subscription_key: ""  # 留空使用免费 preview API; 填入 key 使用完整 API
  request_delay_seconds: 6.0  # Preview API 限流严格，需较长延迟

customs:
  enabled: false  # stats.customs.gov.cn 瑞数6 WAF 无法绕过，关闭
  fallback_to_mofcom: true
  cookie_cache_path: /tmp/customs_cookies.json
  cookie_cache_ttl_minutes: 30
  request_interval_seconds: 8.0

output:
  base_dir: /Users/leez/crawl-china/data
  format: csv
  compress: false

logging:
  level: INFO
  file: /Users/leez/crawl-china/logs/crawler.log
  max_size_mb: 10
  backup_count: 5
